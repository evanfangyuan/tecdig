<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技芯声 | 2026-03-06</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0f0f2d 100%);
            min-height: 100vh;
            color: #e0e0ff;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        .masthead {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .brand {
            font-size: 56px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            margin-bottom: 10px;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }
        .subtitle { font-size: 18px; color: #8888aa; letter-spacing: 3px; text-transform: uppercase; }
        .meta-info { display: flex; justify-content: center; gap: 30px; margin-top: 25px; flex-wrap: wrap; }
        .date-display {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 212, 255, 0.15);
            padding: 6px 14px;
            border-radius: 16px;
            color: #00d4ff;
            font-size: 14px;
        }
        .section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 35px;
            backdrop-filter: blur(10px);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        .section-icon { font-size: 32px; }
        .section-title { font-size: 28px; font-weight: bold; }
        .section-title.news { color: #00d4ff; }
        .section-title.solution { color: #2ed573; }
        .section-title.industry { color: #ffa502; }
        .section-title.risk { color: #ff4757; }
        .section-title.data { color: #7b2ff7; }
        .section-title.humor { color: #9b59b6; }
        .section-desc { font-size: 15px; color: #8888aa; margin-top: 5px; }
        .article-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .article-card:hover { transform: translateX(10px); background: rgba(255, 255, 255, 0.08); }
        .article-card.news { border-color: #00d4ff; }
        .article-card.solution { border-color: #2ed573; }
        .article-card.industry { border-color: #ffa502; }
        .article-card.risk { border-color: #ff4757; }
        .article-title { font-size: 20px; font-weight: bold; color: #ffffff; margin-bottom: 15px; }
        .article-meta { display: flex; gap: 15px; font-size: 13px; color: #8888aa; margin-bottom: 15px; }
        .article-summary { font-size: 15px; color: #ccccdd; line-height: 1.8; }
        .article-detail {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            color: #aaaacc;
            line-height: 1.8;
        }
        .tag {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 8px;
        }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .data-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 47, 247, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .data-value { font-size: 42px; font-weight: bold; color: #00d4ff; margin-bottom: 8px; }
        .data-label { font-size: 14px; color: #8888aa; margin-bottom: 8px; }
        .data-trend { font-size: 13px; color: #2ed573; }
        .data-trend.down { color: #ff4757; }
        .humor-card {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.15), rgba(0, 212, 255, 0.1));
            border: 1px solid rgba(155, 89, 182, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .humor-text { font-size: 16px; line-height: 1.8; color: #d0d0ff; font-style: italic; }
        .humor-emoji { font-size: 24px; margin-right: 10px; }
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #666688;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }
        .wechat-float { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .wechat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 220px;
            text-align: center;
        }
        .qr-image { width: 180px; height: 180px; margin: 10px auto; border-radius: 8px; border: 2px solid rgba(0, 212, 255, 0.3); }
        .qr-image img { width: 100%; height: 100%; object-fit: cover; }
        .qr-text { color: #333; font-size: 13px; line-height: 1.5; margin-top: 12px; font-weight: 500; }
        @media (max-width: 768px) {
            .brand { font-size: 32px; }
            .section { padding: 20px 15px; }
            .article-card { padding: 18px 15px; }
            .data-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <header class="masthead">
            <h1 class="brand">📰 科技芯声</h1>
            <p class="subtitle">Tech Core Voice</p>
            <div class="meta-info">
                <div class="date-display">
                    <span>2026-03-06 Friday</span>
                    <span>📅</span>
                </div>
            </div>
        </header>

        
        
        
        
        
        

        <footer class="footer">
            <p>📱 数据源：互联网搜索聚合 + AI 分析整理</p>
            <p>🔒 置信度说明：90%+=官方/主流媒体确认 | 75-89%=多源交叉验证 | <75%=单一来源/待验证</p>
            <p style="margin-top: 20px;">Generated by AI | 📅 2026-03-06</p>
        </footer>
    </div>

    <div class="wechat-float">
        <div class="wechat-card">
            <div class="qr-image">
                <img src="https://coze-coding-project.tos.coze.site/create_attachment/2026-03-06/1669531069589626_f6a196db9c370cd0c7983ece19093c28_%E5%85%AC%E4%BC%97%E5%8F%B7%E4%BA%8C%E7%BB%B4%E7%A0%81.jpg" alt="公众号二维码">
            </div>
            <div class="qr-text">扫码关注公众号<br>获取每日科技资讯</div>
        </div>
    </div>
</body>
</html>
